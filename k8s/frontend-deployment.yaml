apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookverse-frontend
  namespace: bookverse
  labels:
    app: bookverse-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookverse-frontend
  template:
    metadata:
      labels:
        app: bookverse-frontend
    spec:
      containers:
        - name: frontend
          image: bookverse/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: bookverse-frontend
  namespace: bookverse
spec:
  selector:
    app: bookverse-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
# OpenShift Route (ROSA)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: bookverse
  namespace: bookverse
spec:
  to:
    kind: Service
    name: bookverse-frontend
  port:
    targetPort: 80
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
