apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookverse-backend
  namespace: bookverse
  labels:
    app: bookverse-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookverse-backend
  template:
    metadata:
      labels:
        app: bookverse-backend
    spec:
      containers:
        - name: backend
          image: bookverse/backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bookverse-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bookverse-secrets
                  key: jwt-secret
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bookverse-backend
  namespace: bookverse
spec:
  selector:
    app: bookverse-backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
